name: Jevon
options:
  bundleIdPrefix: com.marcelocantos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Jevon:
    type: application
    platform: iOS
    sources:
      - path: Jevon
      - path: Vendor/lua-5.1.5/src
        excludes: ["lua.c", "luac.c", "loslib.c", "liolib.c", "loadlib.c", "linit.c"]
        compilerFlags: "-w"
      - path: Vendor/sqlpipe/vendor/src/sqlite3.c
        compilerFlags: "-w -DSQLITE_ENABLE_SESSION -DSQLITE_ENABLE_PREUPDATE_HOOK"
      - path: Vendor/sqlpipe/vendor/src/lz4.c
        compilerFlags: "-w"
      - path: Vendor/sqlpipe/vendor/src/sqlift.cpp
        compilerFlags: "-w -std=c++23"
      - path: Vendor/sqlpipe/dist/sqlpipe.cpp
        compilerFlags: "-w -std=c++23 -DSQLITE_ENABLE_SESSION -DSQLITE_ENABLE_PREUPDATE_HOOK"
    settings:
      base:
        INFOPLIST_FILE: Jevon/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.marcelocantos.jevon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_OBJC_BRIDGING_HEADER: Jevon/Jevon-Bridging-Header.h
        HEADER_SEARCH_PATHS: "Vendor/lua-5.1.5/src Vendor/sqlpipe/dist Vendor/sqlpipe/vendor/include"
