<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jevon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

#status { padding: 4px 16px; font-size: 0.75em; color: #555; background: #111; flex-shrink: 0; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.on { background: #2ecc71; }
.dot.off { background: #e74c3c; }

#main { flex: 1; display: flex; overflow: hidden; }

/* Left pane: chat */
#chat-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; min-width: 0; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
.msg.jevon { align-self: flex-start; background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; }
#input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-top: 1px solid #333; }
#input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 15px; outline: none; font-family: inherit; }
#input:focus { border-color: #0f3460; }
#send { padding: 10px 20px; border-radius: 8px; border: none; background: #0f3460; color: #fff; font-size: 15px; cursor: pointer; }
#send:hover { background: #1a5276; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }

/* Collapsible turn details */
.turn-details { align-self: flex-start; max-width: 90%; font-size: 0.8em; }
.turn-details summary { cursor: pointer; color: #888; padding: 4px 8px; border-radius: 6px; user-select: none; }
.turn-details summary:hover { color: #aaa; }
.turn-details[open] summary { margin-bottom: 4px; }
.turn-details .turn-items { display: flex; flex-direction: column; gap: 2px; padding: 4px 8px; border-left: 2px solid #333; margin-left: 8px; }
.turn-item { font-family: "SF Mono", Menlo, monospace; font-size: 0.85em; padding: 2px 0; }
.turn-item.tool-use { color: #b8bb26; }
.turn-item.tool-result { color: #83a598; }
.turn-item.text { color: #d0d0d0; }
.turn-item.error { color: #fb4934; }

/* Right pane: activity */
#activity-pane { width: 400px; flex-shrink: 0; display: flex; flex-direction: column; background: #111; }
#activity-header { padding: 8px 16px; font-size: 0.85em; font-weight: 600; color: #888; border-bottom: 1px solid #222; text-transform: uppercase; letter-spacing: 0.5px; }
#activity { flex: 1; overflow-y: auto; padding: 8px; font-size: 0.8em; font-family: "SF Mono", Menlo, monospace; }
.activity-item { padding: 4px 8px; border-radius: 4px; margin-bottom: 2px; }
.activity-item.tool { color: #b8bb26; }
.activity-item .agent-name { color: #fabd2f; font-weight: 600; margin-right: 6px; }
.activity-item .timestamp { color: #555; margin-right: 6px; }
</style>
</head>
<body>
<div id="status"><span class="dot off" id="dot"></span><span id="status-text">connecting...</span></div>
<div id="main">
  <div id="chat-pane">
    <div id="messages"></div>
    <div id="input-bar">
      <input id="input" placeholder="Talk to Jevon..." autocomplete="off">
      <button id="send" disabled>Send</button>
    </div>
  </div>
  <div id="activity-pane">
    <div id="activity-header">Activity</div>
    <div id="activity"></div>
  </div>
</div>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const sTxt = document.getElementById('status-text');
const activity = document.getElementById('activity');
let ws;

// Current turn's collapsible details element (between user msg and final response).
let turnDetails = null;
let turnItems = null;
let turnCount = 0;

function connect() {
  const h = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+h+'/ws/chat');
  ws.onopen = () => { dot.className='dot on'; sTxt.textContent='connected'; sendBtn.disabled=false; msgs.innerHTML=''; turnDetails=null; turnItems=null; turnCount=0; };
  ws.onclose = () => { dot.className='dot off'; sTxt.textContent='reconnecting...'; sendBtn.disabled=true; setTimeout(connect,2000); };
  ws.onmessage = e => { try{handle(JSON.parse(e.data))}catch(x){console.error(x)} };
}

function handle(m) {
  const typ = m.type;

  if (typ==='user') {
    const content = m.message?.content;
    if (typeof content === 'string') {
      // Human message — close previous turn, show message, start new turn.
      closeTurn();
      addMsg('user', content);
      startTurn();
    } else if (Array.isArray(content)) {
      // Tool results — show in current turn's collapsible section.
      content.forEach(c => {
        if (c.type==='tool_result') {
          const inner = c.content;
          if (typeof inner === 'string') addTurnItem('tool-result', truncate(inner, 120));
          else if (Array.isArray(inner)) inner.forEach(ic => {
            if (ic.type==='text' && ic.text) addTurnItem('tool-result', truncate(ic.text, 120));
          });
        }
      });
    }

  } else if (typ==='assistant') {
    const content = m.message?.content;
    if (!Array.isArray(content)) return;
    const hasText = content.some(c => c.type==='text' && c.text);
    content.forEach(c => {
      if (c.type==='tool_use') {
        addTurnItem('tool-use', c.name + (c.input ? ': ' + summariseInput(c.input) : ''));
        addActivity('tool', 'chat', c.name);
      }
    });
    // Only close the turn and show text when the assistant produces a final text response.
    if (hasText) {
      closeTurn();
      content.forEach(c => {
        if (c.type==='text' && c.text) addMsg('jevon', c.text);
      });
    }

  } else if (typ==='tool_result' || typ==='result') {
    const content = m.content || m.message?.content;
    if (Array.isArray(content)) {
      content.forEach(c => {
        if (c.type==='text' && c.text) addTurnItem('tool-result', truncate(c.text, 120));
      });
    } else if (typeof content === 'string') {
      addTurnItem('tool-result', truncate(content, 120));
    }

  } else if (typ==='system') {
    closeTurn();
  }
}

function startTurn() {
  turnDetails = document.createElement('details');
  turnDetails.className = 'turn-details';
  turnDetails.open = true; // Latest turn starts open.
  const summary = document.createElement('summary');
  summary.textContent = 'working...';
  turnDetails.appendChild(summary);
  turnItems = document.createElement('div');
  turnItems.className = 'turn-items';
  turnDetails.appendChild(turnItems);
  msgs.appendChild(turnDetails);
  turnCount++;
  scrollDown();
}

function closeTurn() {
  if (!turnDetails) return;
  const n = turnItems ? turnItems.children.length : 0;
  if (n === 0) {
    // No intermediate events — remove the empty details.
    turnDetails.remove();
  } else {
    // Update summary with count and collapse.
    turnDetails.querySelector('summary').textContent = n + ' action' + (n===1?'':'s');
    turnDetails.open = false;
  }
  turnDetails = null;
  turnItems = null;
}

function addTurnItem(cls, text) {
  if (!turnItems) startTurn();
  const d = document.createElement('div');
  d.className = 'turn-item ' + cls;
  d.textContent = text;
  turnItems.appendChild(d);
  // Update live summary.
  const n = turnItems.children.length;
  turnDetails.querySelector('summary').textContent = 'working... (' + n + ' action' + (n===1?'':'s') + ')';
  scrollDown();
}

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgs.appendChild(d);
  scrollDown();
  return d;
}

function addActivity(type, agent, text) {
  const d = document.createElement('div');
  d.className = 'activity-item ' + type;
  const now = new Date().toLocaleTimeString('en-AU', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  d.innerHTML = '<span class="timestamp">'+now+'</span><span class="agent-name">'+agent+'</span>'+escHtml(text);
  activity.appendChild(d);
  activity.scrollTop = activity.scrollHeight;
  while (activity.children.length > 500) activity.removeChild(activity.firstChild);
}

function scrollDown() { msgs.scrollTop = msgs.scrollHeight; }
function escHtml(s) { const d=document.createElement('span'); d.textContent=s; return d.innerHTML; }
function truncate(s, n) { return s.length > n ? s.slice(0, n-3) + '...' : s; }
function summariseInput(obj) {
  if (typeof obj === 'string') return truncate(obj, 60);
  const keys = Object.keys(obj);
  if (keys.length === 0) return '';
  // Show first key's value as summary.
  const v = obj[keys[0]];
  return typeof v === 'string' ? truncate(v, 60) : keys.join(', ');
}

function send() {
  const t = input.value.trim();
  if (!t||!ws||ws.readyState!==1) return;
  ws.send(t);
  input.value = '';
}

input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
sendBtn.addEventListener('click', send);
connect();

// Hot reload.
(function hotReload() {
  const rh = location.hostname === 'localhost' ? '127.0.0.1:'+location.port : location.host;
  const rws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+rh+'/ws/reload');
  rws.onmessage = () => location.reload();
  rws.onclose = () => setTimeout(hotReload, 2000);
})();
</script>
</body>
</html>
