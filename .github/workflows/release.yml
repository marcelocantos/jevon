name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: |
          cp agents-guide.md internal/cli/help_agent.md
          go test ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X github.com/marcelocantos/jevon/internal/cli.Version=${VERSION}"
          cp agents-guide.md internal/cli/help_agent.md

          CC=""
          if [[ "${{ matrix.goos }}" == "linux" && "${{ matrix.goarch }}" == "arm64" ]]; then
            CC=aarch64-linux-gnu-gcc
          fi

          CC="${CC}" go build -ldflags "${LDFLAGS}" -o jevond ./cmd/jevond
          CC="${CC}" go build -ldflags "${LDFLAGS}" -o remote ./cmd/remote

          tar czf "jevon-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            jevond remote

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            jevon-*-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
