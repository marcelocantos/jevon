<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jevon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: #666; font-size: 0.8em; font-style: italic; }
#input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-top: 1px solid #333; }
#input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 15px; outline: none; font-family: inherit; }
#input:focus { border-color: #0f3460; }
#send { padding: 10px 20px; border-radius: 8px; border: none; background: #0f3460; color: #fff; font-size: 15px; cursor: pointer; }
#send:hover { background: #1a5276; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
#status { padding: 4px 16px; font-size: 0.75em; color: #555; background: #111; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.on { background: #2ecc71; }
.dot.off { background: #e74c3c; }
</style>
</head>
<body>
<div id="status"><span class="dot off" id="dot"></span><span id="status-text">connecting...</span></div>
<div id="messages"></div>
<div id="input-bar">
  <input id="input" placeholder="Type a message..." autocomplete="off">
  <button id="send" disabled>Send</button>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');

let ws;
let currentStreaming = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/remote?lite=1`);

  ws.onopen = () => {
    dot.className = 'dot on';
    statusText.textContent = 'connected';
    sendBtn.disabled = false;
  };

  ws.onclose = () => {
    dot.className = 'dot off';
    statusText.textContent = 'disconnected — reconnecting...';
    sendBtn.disabled = true;
    currentStreaming = null;
    setTimeout(connect, 2000);
  };

  ws.onmessage = (ev) => {
    try { handleMessage(JSON.parse(ev.data)); } catch (e) {}
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      statusText.textContent = `connected (${msg.version})`;
      break;
    case 'history':
      if (msg.entries) {
        for (const e of msg.entries) {
          addMessage(e.role === 'user' ? 'user' : 'assistant', e.text);
        }
      }
      break;
    case 'text':
      if (!currentStreaming) {
        currentStreaming = addMessage('assistant', '');
      }
      currentStreaming.textContent += msg.content;
      messages.scrollTop = messages.scrollHeight;
      break;
    case 'status':
      if (msg.state === 'thinking') {
        statusText.textContent = 'thinking...';
        currentStreaming = null;
      } else {
        statusText.textContent = 'connected';
        currentStreaming = null;
      }
      break;
    case 'user_message':
      break;
    case 'error':
      addMessage('system', 'Error: ' + msg.message);
      break;
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMessage('user', text);
  ws.send(JSON.stringify({type: 'action', action: 'send_message', value: text}));
  input.value = '';
  currentStreaming = null;
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
connect();
</script>
</body>
</html>
