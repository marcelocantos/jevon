<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claudepty</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: #666; font-size: 0.8em; font-style: italic; }
.msg.assistant code { background: #0f3460; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
.msg.assistant pre { background: #0f3460; padding: 8px; border-radius: 6px; margin: 6px 0; overflow-x: auto; }
.msg.assistant pre code { background: none; padding: 0; }
#input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #16213e; border-top: 1px solid #333; }
#input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 15px; outline: none; font-family: inherit; }
#input:focus { border-color: #0f3460; }
#send { padding: 10px 20px; border-radius: 8px; border: none; background: #0f3460; color: #fff; font-size: 15px; cursor: pointer; }
#send:hover { background: #1a5276; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
#status { padding: 4px 16px; font-size: 0.75em; color: #555; background: #111; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.on { background: #2ecc71; }
.dot.off { background: #e74c3c; }
</style>
</head>
<body>
<div id="status"><span class="dot off" id="dot"></span><span id="status-text">connecting...</span></div>
<div id="messages"></div>
<div id="input-bar">
  <input id="input" placeholder="Type a message..." autocomplete="off">
  <button id="send" disabled>Send</button>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');

let ws;
let thinking = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    dot.className = 'dot on';
    statusText.textContent = 'connected';
    sendBtn.disabled = false;
  };

  ws.onclose = () => {
    dot.className = 'dot off';
    statusText.textContent = 'disconnected — reconnecting...';
    sendBtn.disabled = true;
    setTimeout(connect, 2000);
  };

  ws.onmessage = (ev) => {
    try {
      const entry = JSON.parse(ev.data);
      handleEvent(entry);
    } catch (e) {
      console.log('raw:', ev.data);
    }
  };
}

function handleEvent(entry) {
  switch (entry.type) {
    case 'user': {
      const content = entry.message?.content;
      if (content) {
        for (const c of content) {
          if (c.type === 'text') addMessage('user', c.text);
        }
      }
      break;
    }
    case 'assistant': {
      const content = entry.message?.content;
      if (content) {
        for (const c of content) {
          if (c.type === 'text') addMessage('assistant', c.text);
          if (c.type === 'tool_use') addMessage('system', `🔧 ${c.name}`);
        }
      }
      thinking = false;
      updateThinking();
      break;
    }
    case 'system':
      thinking = false;
      updateThinking();
      break;
    case 'progress': {
      const ptype = entry.data?.type;
      if (ptype === 'tool_result') {
        // Tool finished.
      }
      break;
    }
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function updateThinking() {
  statusText.textContent = thinking ? 'thinking...' : 'connected';
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  addMessage('user', text);
  ws.send(text);
  input.value = '';
  thinking = true;
  updateThinking();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener('click', send);

connect();
</script>
</body>
</html>
